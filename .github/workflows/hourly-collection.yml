name: Hourly collection

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/hourly-collection.yml"
      - "packages/db/migrations/**"
      - "packages/db/src/seed-candidates.ts"
      - "packages/db/src/seed-run.ts"
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: hourly-collection
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      VALIDATOR_BASE_URL: http://127.0.0.1:3001
      CANDIDATE_LIMIT: "50"
      LISTING_LIMIT: "50"
      WORKER_CONCURRENCY: "4"
      WORKER_DEADLINE_MS: "1500000"
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build worker and validator
        run: |
          pnpm --filter @compare/worker... build
          pnpm --filter @compare/validator build

      - name: Migrate database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm db:migrate

      - name: Seed database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm db:seed

      - name: Run bounded collection
        shell: bash
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          VALIDATOR_SHARED_TOKEN: ${{ secrets.VALIDATOR_SHARED_TOKEN }}
        run: |
          set -euo pipefail

          validator_pid=""
          worker_pid=""

          publish_worker_summary() {
            local empty_message="Worker produced no collection output."

            if [[ -s "${RUNNER_TEMP}/worker.log" ]]; then
              cat "${RUNNER_TEMP}/worker.log"
            else
              printf '%s\n' "${empty_message}"
            fi

            {
              printf '## Hourly collection\n\n'
              printf '```text\n'
              if [[ -s "${RUNNER_TEMP}/worker.log" ]]; then
                cat "${RUNNER_TEMP}/worker.log"
              else
                printf '%s\n' "${empty_message}"
              fi
              printf '\n```\n'
            } >>"${GITHUB_STEP_SUMMARY}"
          }

          cleanup() {
            if [[ -n "${worker_pid}" ]]; then
              kill "${worker_pid}" 2>/dev/null || true
              wait "${worker_pid}" 2>/dev/null || true
            fi
            if [[ -n "${validator_pid}" ]]; then
              kill "${validator_pid}" 2>/dev/null || true
              wait "${validator_pid}" 2>/dev/null || true
            fi
          }
          trap cleanup EXIT

          pnpm --filter @compare/validator start \
            >"${RUNNER_TEMP}/validator.log" 2>&1 &
          validator_pid=$!

          deadline=$((SECONDS + 30))
          validator_healthy=false
          while (( SECONDS < deadline )); do
            if ! kill -0 "${validator_pid}" 2>/dev/null; then
              echo "Validator exited before becoming healthy." >&2
              exit 1
            fi

            if curl --fail --silent --show-error --max-time 1 \
              http://127.0.0.1:3001/health >/dev/null; then
              validator_healthy=true
              break
            fi

            if (( SECONDS < deadline )); then
              sleep 1
            fi
          done

          if [[ "${validator_healthy}" != "true" ]]; then
            echo "Validator health check timed out after 30 seconds." >&2
            exit 1
          fi

          pnpm --filter @compare/worker run-once \
            >"${RUNNER_TEMP}/worker.log" 2>&1 &
          worker_pid=$!

          while true; do
            if ! kill -0 "${validator_pid}" 2>/dev/null; then
              echo "Validator exited while the worker was running." >&2
              exit 1
            fi

            if ! kill -0 "${worker_pid}" 2>/dev/null; then
              if wait "${worker_pid}"; then
                worker_status=0
              else
                worker_status=$?
              fi
              worker_pid=""

              publish_worker_summary || true

              if (( worker_status != 0 )); then
                exit "${worker_status}"
              fi

              if ! kill -0 "${validator_pid}" 2>/dev/null; then
                echo "Validator exited before worker completion was confirmed." >&2
                exit 1
              fi

              exit 0
            fi

            sleep 1
          done
